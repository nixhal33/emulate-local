<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Emulate Gateway</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="background"></div>

  <main class="container">

    <header>

      <h1>🚀 Emulate Gateway</h1>

      <p>
        Local API Simulation Platform
      </p>

    </header>

    <section class="services">

      <div class="card">

        <h2>Google</h2>

        <span class="status online">
          ● Running
        </span>

        <p>Port 4000</p>

        <button data-port="4000">
          Open API
        </button>

      </div>

      <div class="card">

        <h2>Apple</h2>

        <span class="status online">
          ● Running
        </span>

        <p>Port 4001</p>

        <button data-port="4001">
          Open API
        </button>

      </div>

      <div class="card">

        <h2>Resend</h2>

        <span class="status online">
          ● Running
        </span>

        <p>Port 4002</p>

        <button data-port="4002">
          Open API
        </button>

      </div>

      <div class="card">

        <h2>Stripe</h2>

        <span class="status online">
          ● Running
        </span>

        <p>Port 4003</p>

        <button data-port="4003">
          Open API
        </button>

      </div>

      <div class="card">

        <h2>Twilio</h2>

        <span class="status online">
          ● Running
        </span>

        <p>Port 4004</p>

        <button data-port="4004">
          Open API
        </button>

      </div>

    </section>

    <section class="footer">

      <h3>API Endpoints</h3>

      <ul>

        <li>/health</li>

        <li>/services</li>

      </ul>

      <p class="credits">

        Powered by Vercel Labs Emulate

        <br>

        Customized by Kubenix 🚀

      </p>

    </section>

  </main>

  <script src="app.js"></script>

</body>

</html>
