user  nginx;
worker_processes  auto;

events {
  worker_connections  1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile on;
  keepalive_timeout 65;
  server_tokens off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream landing     { server emulate:80}
  upstream google_api   { server emulate:4000; }
  upstream apple_api    { server emulate:4001; }
  upstream resend_api   { server emulate:4002; }
  upstream stripe_api 	{ server emulate:4003; }
  upstream twilio_api   { server emulate:4004; }
  # add stripe_api similarly if it's a 6th port, or reassign as needed

  server {
    listen 80;
    listen [::]:80;
    server_name _;

    location / {
      proxy_pass http://landing;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 300;
      proxy_connect_timeout 60;
    }

    location /google/  { proxy_pass http://google_api/; proxy_set_header Host $host; }
    location /apple/   { proxy_pass http://apple_api/;  proxy_set_header Host $host; }
    location /resend/  { proxy_pass http://resend_api/; proxy_set_header Host $host; }
    location /twilio/  { proxy_pass http://twilio_api/; proxy_set_header Host $host; }
  }
}
